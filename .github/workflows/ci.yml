name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  typecheck-and-audit:
    name: Typecheck and Security Audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'


      - name: Install Root Dependencies
        run: npm ci || npm install

      - name: Security Audit (Root)
        run: npm audit --audit-level=critical

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Typecheck (Backend)
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Security Audit (Backend)
        working-directory: ./backend
        run: npm audit --audit-level=critical

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Typecheck (Frontend)
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Security Audit (Frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=critical

  build-docker:
    name: Build Docker Images
    needs: typecheck-and-audit
    # Runs when merged (pushed) to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t execra-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t execra-frontend ./frontend

  load-test:
    runs-on: ubuntu-latest
    needs: [typecheck-and-audit]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' && vars.STAGING_URL != ''
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz \
            -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.55.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version
      - name: Run smoke test
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: k6 run load-tests/smoke.js
