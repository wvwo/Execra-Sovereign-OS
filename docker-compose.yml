# Execra Sovereign OS — Docker Compose Configuration
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VISION_ENGINE_URL=http://vision:8000
      - SENTINEL_URL=http://sentinel:8001
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://autopilot:${DB_PASSWORD}@postgres:5432/autopilot
      - SENTINEL_URL=http://sentinel:8001
      - SENTINEL_API_KEY=${SENTINEL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}


    depends_on:
      - vision
      - sentinel
      - redis
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  vision:
    build: ./vision
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./tmp/frames:/tmp/frames
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sentinel:
    build: ./sentinel
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./audit_logs:/var/log/process_autopilot/audit
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
      - SENTINEL_API_KEY=${SENTINEL_API_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=autopilot
      - POSTGRES_USER=autopilot
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    restart: unless-stopped
    container_name: autopilot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:RELEASE.2023-11-20T16-30-59Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb local/autopilot-screenshots --ignore-existing;
      # Removed: mc anonymous set download to keep bucket private
      exit 0;
      "

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: execra_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - internal
      - default
    restart: unless-stopped
    user: "65534:65534"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.2
    container_name: execra_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3002/grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - internal
      - default
    restart: unless-stopped
    user: "472:472"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  execution:
    build: ./execution
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    expose:
      - "4001"
    environment:
      - NODE_ENV=production
      - SENTINEL_URL=http://sentinel:8001
      - SENTINEL_API_KEY=${SENTINEL_API_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=autopilot-screenshots
    depends_on:
      - sentinel
      - minio

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
