global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: '/metrics'

  - job_name: 'vision'
    static_configs:
      - targets: ['vision:8000']
    metrics_path: '/metrics'

  - job_name: 'sentinel'
    static_configs:
      - targets: ['sentinel:8001']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
